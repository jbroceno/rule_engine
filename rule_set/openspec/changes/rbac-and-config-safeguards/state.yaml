  - Tamaño confirmado >400 líneas (~871 estimado; backend x3 + SQL + Angular) — 4 PRs encadenados (RBAC / apply safeguard / snapshot integrity / frontend polish), chain_strategy=stacked-to-main (confirmado por el usuario 2026-07-11), cada PR se mergea a main en orden.
  - 3 WARNINGs abiertos, sin cerrar tras el verify de cambio completo (ver verify_report): falta test HTTP-level (supertest) para el gate /admin, falta test de regresión para /workflow sin gate, y scripts/seed_user.mjs no valida --role contra ALLOWED_ROLES. Ninguno bloquea el archive; candidatos a fast-follow.


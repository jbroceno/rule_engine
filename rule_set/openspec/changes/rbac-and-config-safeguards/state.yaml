change: rbac-and-config-safeguards
title: RBAC efectivo y salvaguardas de integridad de configuración (OWASP-01/02/10)
status: proposed
created_at: '2026-07-10'

phases_done:
  - proposal
  - spec
  - design
  - tasks

phases_pending:
  - apply
  - verify
  - archive

summary:
  description: >
    Endurece la superficie de administración frente a tres hallazgos de la auditoría OWASP
    Top 10 (informe-owasp-top10-2026-07-10.md): OWASP-01 (sin RBAC real — el role del JWT no
    se aplica en ninguna ruta), OWASP-02 (POST /admin/config/apply con deleteAllPeriods:true
    reemplaza toda la configuración con solo un texto libre como salvaguarda) y OWASP-10
    (restauración de snapshots sin verificación de integridad). Solución proporcionada al
    alcance TFM: middleware factory requireRole("admin") en el montaje del router admin;
    confirmación explícita (confirmReplaceAll) + previsualización de impacto (dry-run) para
    el apply; HMAC-SHA256 sobre rules_json+params_json calculado al crear el snapshot y
    verificado antes de restaurar. Incluye migración SQL (columna checksum), manejo de 403
    en el interceptor Angular y diálogo de confirmación con previsualización.

owasp_findings:
  - OWASP-01  # A01 Broken Access Control — RBAC decorativo (Critical)
  - OWASP-02  # A04 Insecure Design — reemplazo total sin salvaguarda real (Critical)
  - OWASP-10  # A08 Software/Data Integrity — snapshots sin checksum/firma (High)

decisions:
  roles: Modelo de dos roles (admin | viewer); gate único requireRole("admin") sobre /api/admin/*; 403 (no 401) para rol insuficiente.
  apply_safeguard: confirmReplaceAll:true obligatorio (400 si falta) + previsualización de impacto dry-run (offer codes, rules/params a borrar e insertar); snapshot previo se conserva.
  snapshot_integrity: HMAC-SHA256 (node:crypto, sin dependencia nueva) con SNAPSHOT_HMAC_SECRET (fallback a JWT_SECRET); columna checksum NVARCHAR(64) NULL; snapshots legados (NULL) = no verificables (aviso, sin bloqueo).


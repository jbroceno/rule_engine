<main class="login-shell">
  <div class="login-card">
    <header class="login-header">
      <div class="brand-mark" aria-hidden="true"></div>
      <h1>Motor de Reglas</h1>
      <p class="subtitle">Acceso al panel de administración</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate autocomplete="on">
      <div class="field-group">
        <label for="email" class="field-label">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="username"
          placeholder="usuario@banco.com"
          [class.input-error]="form.controls.email.invalid && form.controls.email.touched"
        />
        <p
          class="field-error"
          aria-live="polite"
          *ngIf="form.controls.email.invalid && form.controls.email.touched"
        >
          Introduce un email válido.
        </p>
      </div>

      <div class="field-group">
        <label for="password" class="field-label">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="••••••••"
          [class.input-error]="form.controls.password.invalid && form.controls.password.touched"
        />
        <p
          class="field-error"
          aria-live="polite"
          *ngIf="form.controls.password.invalid && form.controls.password.touched"
        >
          La contraseña es obligatoria.
        </p>
      </div>

      <p class="server-error" aria-live="assertive" *ngIf="errorMsg() as msg">
        <span class="error-icon" aria-hidden="true">&#9888;</span>{{ msg }}
      </p>

      <button type="submit" class="btn btn-login" [disabled]="pending()">
        <span class="btn-spinner" *ngIf="pending()"></span>
        {{ pending() ? "Accediendo…" : "Acceder" }}
      </button>
    </form>
  </div>
</main>

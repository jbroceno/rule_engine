server {
    listen       80;
    server_name  _;
    return 301 https://$host$request_uri;
}

server {
    listen       443 ssl;
    server_name  _;

    ssl_certificate     /certs/fullchain.pem;
    ssl_certificate_key /certs/privkey.pem;

    root   /usr/share/nginx/html;
    index  index.html;

    # Proxy de la API: /api/... -> contenedor "api" (se preserva el prefijo /api)
    # HTTPS interno: api monta el MISMO volumen de certificados (docker-compose.yml)
    # y usa la misma comprobación de fichero que este vhost (docker-entrypoint-tls.sh),
    # así que si nginx eligió este vhost SSL, api también está sirviendo HTTPS en :3000.
    # proxy_ssl_verify off: el cert es para el dominio público, no para el hostname
    # interno "api" de la red de docker-compose — verificar el CN aquí fallaría siempre.
    location /api/ {
        proxy_pass         https://api:3000;
        proxy_ssl_verify   off;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA: cualquier ruta desconocida sirve index.html (routing de Angular)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
